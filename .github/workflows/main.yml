name: GitHub Contribution Snake

on:
  schedule:
    - cron: '0 0 * * *'   # daily at midnight UTC
  workflow_dispatch:       # manual trigger

jobs:
  build-and-push-snake:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout repo
      - uses: actions/checkout@v3

      # 2️⃣ Show Node & npm versions for debugging
      - name: Show Node.js version
        run: |
          node -v
          npm -v

      # 3️⃣ Set up Node.js
      - uses: actions/setup-node@v3
        with:
          node-version: '20'

      # 4️⃣ Install snake generator globally
      - name: Install snake generator
        run: npm install -g github-contribution-grid-snake

      # 5️⃣ Ensure output folder exists
      - name: Create output folder
        run: mkdir -p output

      # 6️⃣ Generate GitHub contribution snake safely
      - name: Generate contribution snake
        run: |
          echo "Generating contribution snake..."
          npx github-contribution-grid-snake \
            -u BethanyaWondimagegn \
            -o output/github-contribution-grid-snake.svg \
            -t ${{ secrets.GITHUB_TOKEN }} \
            || echo "Snake generation failed, continuing workflow"

      # 7️⃣ Configure Git safely
      - name: Configure Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      # 8️⃣ Commit & push snake safely
      - name: Commit and push snake
        run: |
          git add output/github-contribution-grid-snake.svg
          git commit -m "Update contribution snake" || echo "No changes to commit"
          git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/BethanyaWondimagegn/bit_pro.git HEAD:main
